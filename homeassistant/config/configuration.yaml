# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

rest_command:
  gemini_daily_status:
    url: !secret gemini_daily_status_url
    method: POST
    content_type: "application/json"
    timeout: 20
    payload: >-
      {
        "contents": [
          {
            "parts": [
              {
                "text": {{ prompt | tojson }}
              }
            ]
          }
        ],
        "generationConfig": {
          "temperature": 0.1,
          "maxOutputTokens": 160
        }
      }

  ha_logbook_last_day:
    url: "http://192.168.1.67:8123/api/logbook"
    method: GET
    timeout: 20
    headers:
      Authorization: !secret ha_llat_bearer
      Content-Type: "application/json"

counter:
  assistant_persistent_notifications:
    name: Assistant persistent notifications
    initial: 0
    step: 1
    restore: true

input_text:
  assistant_last_notification_title:
    name: Assistant last notification title
    max: 120
  assistant_last_notification_message:
    name: Assistant last notification message
    max: 255
  daily_status_last_summary:
    name: Daily Status Last Summary
    max: 255

input_datetime:
  daily_status_last_summary_time:
    name: Daily Status Last Summary Time
    has_date: true
    has_time: true

template:
  - sensor:
      - name: "Assistant notification banner"
        unique_id: assistant_notification_banner
        icon: mdi:bell
        state: >
          {% set n = states('counter.assistant_persistent_notifications')|int(0) %}
          {% if n == 0 %}
            No notifications
          {% elif n == 1 %}
            {{ states('input_text.assistant_last_notification_title')
               or '1 notification' }}
          {% else %}
            {{ n }} notifications (last: {{ states('input_text.assistant_last_notification_title') }})
          {% endif %}
        attributes:
          count: "{{ states('counter.assistant_persistent_notifications')|int(0) }}"
          last_title: "{{ states('input_text.assistant_last_notification_title') }}"
          last_message: "{{ states('input_text.assistant_last_notification_message') }}"