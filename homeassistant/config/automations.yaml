- alias: "Frigate - daily status reset"
  id: frigate_daily_status_reset
  mode: single
  trigger:
    - platform: time
      at: "00:00:10"

  action:
    - service: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.dog_seen_today
          - input_boolean.cat_seen_today
          - input_boolean.leonardo_seen_today
          - input_boolean.beatriz_seen_today
          - input_boolean.amazon_seen_today
          - input_boolean.ctt_seen_today
          - input_boolean.police_seen_today
          - input_boolean.leonardo_car_arrived_today
          - input_boolean.leonardo_car_left_today
          - input_boolean.unknown_person_detected_today
          - input_boolean.unknown_vehicle_detected_today

    - service: input_number.set_value
      target:
        entity_id:
          - input_number.amazon_count_today
          - input_number.ctt_count_today
          - input_number.police_count_today
          - input_number.unknown_person_count_today
          - input_number.unknown_vehicle_count_today
      data:
        value: 0

- alias: "Frigate - new pet notification"
  id: frigate_notify_new_pet
  mode: queued
  trigger:
    - platform: mqtt
      topic: frigate/events

  condition:
    - condition: template
      value_template: >
        {{ trigger.payload_json.type == 'new'
           and trigger.payload_json.after is defined
           and trigger.payload_json.after.label in ['dog', 'cat'] }}

  variables:
    pet_name: "{{ trigger.payload_json.after.label | title }}"
    camera_friendly: "{{ trigger.payload_json.after.camera | replace('_', ' ') | title }}"
    message: "{{ pet_name }} was detected on camera {{ camera_friendly }}"

  action:
    - service: script.broadcast_announcement
      data:
        title: "[Frigate] {{ pet_name }} Alert"
        message: "{{ message }}"
        notification_id: "{{ trigger.payload_json.after.label }}_detected_{{ trigger.payload_json.after.camera }}"

- alias: "Frigate - update pet last seen"
  id: frigate_update_pet_last_seen
  mode: queued
  trigger:
    - platform: mqtt
      topic: frigate/events

  condition:
    - condition: template
      value_template: >
        {{ trigger.payload_json.after is defined and
           trigger.payload_json.after.label in ['dog', 'cat'] }}

  variables:
    pet_label: "{{ trigger.payload_json.after.label }}"
    camera_name: "{{ trigger.payload_json.after.camera }}"
    seen_today_entity: "input_boolean.{{ pet_label }}_seen_today"
    first_seen_entity: "input_datetime.{{ pet_label }}_first_seen_today"

  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ is_state(seen_today_entity, 'off') }}"
          sequence:
            - service: input_datetime.set_datetime
              data:
                entity_id: "{{ first_seen_entity }}"
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            - service: input_boolean.turn_on
              data:
                entity_id: "{{ seen_today_entity }}"

    - service: input_datetime.set_datetime
      target:
        entity_id: "input_datetime.{{ pet_label }}_last_seen"
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - service: input_text.set_value
      target:
        entity_id: "input_text.{{ pet_label }}_last_camera"
      data:
        value: "{{ camera_name }}"

    - service: input_boolean.turn_off
      target:
        entity_id: "input_boolean.{{ pet_label }}_missing_alert_sent"


- alias: "Frigate - pet absence alert"
  id: frigate_pet_absence_alert
  mode: single
  trigger:
    - platform: time_pattern
      minutes: "/1"

  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ states('input_datetime.dog_last_seen') not in ['unknown', 'unavailable', '', none]
                   and (as_timestamp(now()) - as_timestamp(states('input_datetime.dog_last_seen'))) >= (15 * 60)
                   and is_state('input_boolean.dog_missing_alert_sent', 'off') }}
          sequence:
            - variables:
                message: >
                  Dog was last seen at
                  {{ as_timestamp(states('input_datetime.dog_last_seen')) | timestamp_custom('%H:%M') }}
                  on camera
                  {{ states('input_text.dog_last_camera') | replace('_', ' ') | title }}
            - service: script.broadcast_announcement
              data:
                title: "[Frigate] Dog Alert"
                message: "{{ message }}"
                notification_id: "dog_last_seen"
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.dog_missing_alert_sent

    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ states('input_datetime.cat_last_seen') not in ['unknown', 'unavailable', '', none]
                   and (as_timestamp(now()) - as_timestamp(states('input_datetime.cat_last_seen'))) >= (15 * 60)
                   and is_state('input_boolean.cat_missing_alert_sent', 'off') }}
          sequence:
            - variables:
                message: >
                  Cat was last seen at
                  {{ as_timestamp(states('input_datetime.cat_last_seen')) | timestamp_custom('%H:%M') }}
                  on camera
                  {{ states('input_text.cat_last_camera') | replace('_', ' ') | title }}
            - service: script.broadcast_announcement
              data:
                title: "[Frigate] Cat Alert"
                message: "{{ message }}"
                notification_id: "cat_last_seen"
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.cat_missing_alert_sent


- alias: "Frigate - update resident last seen"
  id: frigate_update_resident_last_seen
  mode: queued
  trigger:
    - platform: mqtt
      topic: frigate/events

  condition:
    - condition: template
      value_template: >
        {{ trigger.payload_json.after is defined and
           trigger.payload_json.after.label == 'person' and
           trigger.payload_json.after.sub_label is defined and
           trigger.payload_json.after.sub_label is not none }}

  action:
    - variables:
        person_name: "{{ trigger.payload_json.after.sub_label[0] }}"
        person_slug: >
          {{ trigger.payload_json.after.sub_label[0]
             | lower
             | replace(' ', '_')
             | replace('ã', 'a')
             | replace('á', 'a')
             | replace('à', 'a')
             | replace('â', 'a')
             | replace('é', 'e')
             | replace('ê', 'e')
             | replace('í', 'i')
             | replace('ó', 'o')
             | replace('ô', 'o')
             | replace('õ', 'o')
             | replace('ú', 'u')
             | replace('ç', 'c') }}
        tracked_daily_residents:
          - leonardo
          - beatriz
        seen_today_entity: "input_boolean.{{ person_slug }}_seen_today"
        first_seen_entity: "input_datetime.{{ person_slug }}_first_seen_today"

    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ person_slug in tracked_daily_residents and
                   is_state(seen_today_entity, 'off') }}
          sequence:
            - service: input_datetime.set_datetime
              data:
                entity_id: "{{ first_seen_entity }}"
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

            - service: input_boolean.turn_on
              data:
                entity_id: "{{ seen_today_entity }}"

    - service: input_text.set_value
      data:
        entity_id: "input_text.{{ person_slug }}_last_camera"
        value: "{{ trigger.payload_json.after.camera }}"

    - service: input_datetime.set_datetime
      data:
        entity_id: "input_datetime.{{ person_slug }}_last_seen"
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - service: input_boolean.turn_off
      data:
        entity_id: "input_boolean.{{ person_slug }}_missing_alert_sent"


- alias: "Frigate - known person notification"
  id: frigate_known_person_notification
  mode: queued
  trigger:
    - platform: mqtt
      topic: frigate/events

  condition:
    - condition: template
      value_template: >
        {{ trigger.payload_json.type == 'new' and
           trigger.payload_json.after is defined and
           trigger.payload_json.after.label == 'person' and
           trigger.payload_json.after.sub_label is defined and
           trigger.payload_json.after.sub_label is not none and
           trigger.payload_json.after.sub_label | count > 0 }}

  action:
    - variables:
        person_name: "{{ trigger.payload_json.after.sub_label[0] }}"
        person_slug: >
          {{ trigger.payload_json.after.sub_label[0]
             | lower
             | replace(' ', '_')
             | replace('ã', 'a')
             | replace('á', 'a')
             | replace('à', 'a')
             | replace('â', 'a')
             | replace('é', 'e')
             | replace('ê', 'e')
             | replace('í', 'i')
             | replace('ó', 'o')
             | replace('ô', 'o')
             | replace('õ', 'o')
             | replace('ú', 'u')
             | replace('ç', 'c') }}
        cooldown_seconds: 120
        last_announced_entity: "input_datetime.{{ person_slug }}_last_announced"

    - condition: template
      value_template: >
        {% set last = states(last_announced_entity) %}
        {{ last in ['unknown', 'unavailable', '', none] or
           (as_timestamp(now()) - as_timestamp(last)) > cooldown_seconds }}

    - service: script.broadcast_announcement
      data:
        title: "[Frigate] Known Person Alert"
        message: "{{ person_name }} was detected on camera {{ trigger.payload_json.after.camera | replace('_', ' ') | title }}"
        notification_id: "frigate_known_person_{{ person_slug }}"

    - service: input_datetime.set_datetime
      data:
        entity_id: "{{ last_announced_entity }}"
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"


