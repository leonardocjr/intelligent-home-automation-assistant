- alias: "Arm alarm when all residents are unseen"
  id: arm_alarm_when_all_residents_are_unseen
  mode: single
  trigger:
    - platform: time_pattern
      minutes: "/1"

  variables:
    resident_slugs:
      - leonardo
      - beatriz
    away_delay_seconds: "{{ 15 * 60 }}"
    all_residents_away: >
      {% set ns = namespace(all_away=true) %}
      {% for slug in resident_slugs %}
        {% set entity = 'input_datetime.' ~ slug ~ '_last_seen' %}
        {% set last_seen = states(entity) %}
        {% if last_seen in ['unknown', 'unavailable', '', None] %}
          {% set ns.all_away = false %}
        {% else %}
          {% set elapsed = as_timestamp(now()) - as_timestamp(last_seen) %}
          {% if elapsed < away_delay_seconds | int %}
            {% set ns.all_away = false %}
          {% endif %}
        {% endif %}
      {% endfor %}
      {{ ns.all_away }}

  condition:
    - condition: template
      value_template: "{{ all_residents_away }}"
    - condition: state
      entity_id: input_boolean.house_alarm_armed
      state: "off"

  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.house_alarm_armed

    - service: script.broadcast_announcement
      data:
        title: "[Frigate] Alarm armed alert"
        message: "House empty for 15 minutes. Alarm was armed."
        notification_id: "house_empty"
        

