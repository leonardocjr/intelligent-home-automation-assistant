      value_template: "{{ camera_name == 'entrance_cam' }}"

    - condition: template
      value_template: >
        {{ (plate_name is none or plate_name == '') and plate_norm != '' }}

    - condition: template
      value_template: >
        {{ states('input_text.frigate_last_unknown_plate_event_id') != event_id }}

  action:
    - service: persistent_notification.create
      data:
        title: "[Frigate] Unknown vehicle alert"
        message: >
          Unknown vehicle detected inside the perimeter on camera {{ camera_name | replace('_', ' ') | title }}
          Plate: {{ plate_raw }}.
        notification_id: "frigate_unknown_plate_{{ camera_name }}"

    - service: notify.alexa_media
      data:
        target:
          - media_player.speaker
        message: >
          Attention. An unknown car has arrived at the perimeter on camera {{ camera_name | replace('_', ' ') | title }}
        data:
          type: announce

    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.unknown_vehicle_detected_today

    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.last_unknown_vehicle_time
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - service: input_number.set_value
      target:
        entity_id: input_number.unknown_vehicle_count_today
      data:
        value: "{{ states('input_number.unknown_vehicle_count_today') | int(0) + 1 }}"

    - service: input_text.set_value
      target:
        entity_id: input_text.frigate_last_unknown_plate_event_id
      data:
        value: "{{ event_id }}"


- alias: "Frigate - unknown person at entrance perimeter"
