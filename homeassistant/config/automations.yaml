- alias: "Frigate - authorized resident gestures"
  id: frigate_authorized_resident_gestures
  mode: queued
  trigger:
    - platform: mqtt
      topic: frigate/events

  variables:
    authorized_residents:
      - leonardo

    person_slug: >
      {% set sub = trigger.payload_json.after.sub_label %}
      {% if sub is string %}
        {{ sub | lower | replace(' ', '_') }}
      {% elif sub is iterable and sub | count > 0 %}
        {{ sub[0] | lower | replace(' ', '_') }}
      {% else %}
        unknown
      {% endif %}

    event_id: "{{ trigger.payload_json.after.id | default('') }}"
    event_camera: "{{ trigger.payload_json.after.camera | default('') }}"

    gesture_name: >
      {% set g = trigger.payload_json.after.gestures | default([]) %}
      {% if g is iterable and g | count > 0 %}
        {{ g[0] | lower }}
      {% else %}
        none
      {% endif %}

    gesture_score: >
      {% set g = trigger.payload_json.after.gestures | default([]) %}
      {% if g is iterable and g | count > 1 %}
        {{ g[1] }}
      {% else %}
        0
      {% endif %}

  condition:
    - condition: template
      value_template: >
        {{ trigger.payload_json.type in ['new', 'update'] }}

    - condition: template
      value_template: >
        {{ trigger.payload_json.after is defined and
           trigger.payload_json.after.label == 'person' and
           trigger.payload_json.after.sub_label is defined and
           trigger.payload_json.after.sub_label is not none }}

    - condition: template
      value_template: >
        {{ person_slug in authorized_residents }}

    - condition: template
      value_template: >
        {{ gesture_name in ['thumbsup', 'thumbsdown', 'punch', 'stophand'] }}

    - condition: template
      value_template: >
        {{ not (
             states('input_text.leonardo_last_gesture_event_id') == event_id
             and states('input_text.leonardo_last_gesture_name') == gesture_name
           ) }}

  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ gesture_name == 'thumbsup' and
                   is_state('input_boolean.house_alarm_armed', 'off') }}
          sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.house_alarm_armed

            - service: script.broadcast_announcement
              data:
                title: "[Frigate] Alarm armed via gesture alert"
                message: >
                  Leonardo recognized. Thumbs up detected. Alarm armed.
                notification_id: "frigate_alarm_gesture"

        - conditions:
            - condition: template
              value_template: >
                {{ gesture_name == 'thumbsdown' and
                   is_state('input_boolean.house_alarm_armed', 'on') }}
          sequence:
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.house_alarm_armed

            - service: script.broadcast_announcement
              data:
                title: "[Frigate] Alarm disarmed via gesture alert"
                message: >
                  Leonardo recognized. Thumbs down detected. Alarm disarmed.
                notification_id: "frigate_alarm_gesture"

        - conditions:
            - condition: template
              value_template: >
                {{ gesture_name == 'punch' and
                   is_state('input_boolean.gate_is_open', 'off') }}
          sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.gate_is_open

            - service: script.broadcast_announcement
              data:
                title: "[Frigate] Gate opened via gesture alert"
                message: >
                  Leonardo recognized. Punch detected. Gate opened.
                notification_id: "frigate_gate_gesture"

        - conditions:
            - condition: template
              value_template: >
                {{ gesture_name == 'stophand' and
                   is_state('input_boolean.gate_is_open', 'on') }}
          sequence:
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.gate_is_open

            - service: script.broadcast_announcement
              data:
                title: "[Frigate] Gate closed via gesture alert"
                message: >
                  Leonardo recognized. Stop hand detected. Gate closed.
                notification_id: "frigate_gate_gesture"

    - service: input_text.set_value
      target:
        entity_id: input_text.leonardo_last_gesture_event_id
      data:
        value: "{{ event_id }}"

    - service: input_text.set_value
      target:
        entity_id: input_text.leonardo_last_gesture_name
      data:
        value: "{{ gesture_name }}"


- alias: "Frigate - external security audio alerts all cameras"
  id: frigate_external_security_audio_alerts_all_cameras
  mode: parallel
  trigger:
    - platform: mqtt
      topic: frigate/+/audio/fire_alarm
      payload: "ON"
      id: fire_alarm

    - platform: mqtt
      topic: frigate/+/audio/scream
      payload: "ON"
      id: scream

    - platform: mqtt
      topic: frigate/+/audio/yell
      payload: "ON"
      id: yell

  variables:
    camera_name: "{{ trigger.topic.split('/')[1] }}"
    audio_type: "{{ trigger.topic.split('/')[3] }}"

  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.id == 'fire_alarm' }}"
          sequence:
            - service: script.broadcast_announcement
              data:
                title: "[Frigate] Security fire alarm alert"
                message: >
                  Attention! I identified a fire alarm on camera {{ camera_name | replace('_', ' ') | title }}
                notification_id: "frigate_fire_alarm_{{ camera_name }}"

        - conditions:
            - condition: template
              value_template: "{{ trigger.id in ['scream', 'yell'] }}"
          sequence:
            - service: script.broadcast_announcement
              data:
                title: "[Frigate] Scream detect alert"
                message: >
                  Attention - A scream was detected on camera {{ camera_name | replace('_', ' ') | title }}
                  Audio type: {{ audio_type }}.
                notification_id: "frigate_scream_{{ camera_name }}"


- alias: "Frigate - known plate arrival"
  id: frigate_known_plate_leonardo_arrival
  mode: queued
  trigger:
    - platform: mqtt
      topic: frigate/tracked_object_update

  variables:
    payload: "{{ trigger.payload_json }}"
    event_id: "{{ payload.id | default('') }}"
    camera_name: "{{ payload.camera | default('') }}"
    plate_name: "{{ payload.name | default('') }}"
    plate_raw: "{{ payload.plate | default('') }}"
    plate_norm: "{{ plate_raw | upper | replace('-', '') | replace(' ', '') }}"

  condition:
    - condition: template
      value_template: "{{ payload.type == 'lpr' }}"

    - condition: template
      value_template: "{{ camera_name == 'entrance_cam' }}"

    - condition: template
      value_template: >
        {{ (plate_name | lower == 'leonardo') or (plate_norm == 'GAZ1G92') }}

    - condition: template
      value_template: >
        {{ states('input_text.frigate_last_known_plate_event_id') != event_id }}

  action:
    - service: persistent_notification.create
      data:
        title: "[Frigate] Known vehicle alert"
        message: >
          Leonardo's car arrived at the garage on camera {{ camera_name | replace('_', ' ') | title }}
          Plate: {{ plate_norm }}.
        notification_id: "frigate_known_plate_{{ camera_name }}"

    - service: notify.alexa_media
      data:
        target:
          - media_player.speaker
        message: >
          Leonardo has arrived at the garage.
        data:
          type: announce

    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.leonardo_car_arrived_today

    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.leonardo_car_arrived_at
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - service: input_text.set_value
      target:
        entity_id: input_text.frigate_last_known_plate_event_id
      data:
        value: "{{ event_id }}"


