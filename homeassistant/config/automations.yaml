- alias: "Frigate - identified carrier and police vehicles"
  id: frigate_identified_car_alerts
  mode: queued
  trigger:
    - platform: mqtt
      topic: frigate/tracked_object_update

  variables:
    payload: "{{ trigger.payload_json }}"
    event_id: "{{ payload.id | default('') }}"
    camera_name: "{{ payload.camera | default('unknown_camera') }}"
    camera_friendly: "{{ camera_name | replace('_', ' ') | title }}"
    model_name: "{{ payload.model | default('') }}"
    identified_value: "{{ payload.attribute | default(payload.sub_label | default('')) | lower }}"
    vehicle_name: >
      {% if identified_value == 'ctt' %}
        CTT
      {% elif identified_value == 'amazon' %}
        Amazon
      {% elif identified_value == 'police' %}
        police
      {% else %}
        {{ identified_value }}
      {% endif %}
    seen_boolean_entity: >
      {% if identified_value == 'amazon' %}
        input_boolean.amazon_seen_today
      {% elif identified_value == 'ctt' %}
        input_boolean.ctt_seen_today
      {% elif identified_value == 'police' %}
        input_boolean.police_seen_today
      {% else %}
        input_boolean.amazon_seen_today
      {% endif %}
    last_seen_entity: >
      {% if identified_value == 'amazon' %}
        input_datetime.amazon_last_seen_today
      {% elif identified_value == 'ctt' %}
        input_datetime.ctt_last_seen_today
      {% elif identified_value == 'police' %}
        input_datetime.police_last_seen_today
      {% else %}
        input_datetime.amazon_last_seen_today
      {% endif %}
    count_entity: >
      {% if identified_value == 'amazon' %}
        input_number.amazon_count_today
      {% elif identified_value == 'ctt' %}
        input_number.ctt_count_today
      {% elif identified_value == 'police' %}
        input_number.police_count_today
      {% else %}
        input_number.amazon_count_today
      {% endif %}

  condition:
    - condition: template
      value_template: "{{ payload.type == 'classification' }}"
    - condition: template
      value_template: "{{ model_name == 'identified_cars' }}"
    - condition: template
      value_template: "{{ identified_value in ['amazon', 'ctt', 'police'] }}"
    - condition: template
      value_template: "{{ states('input_text.frigate_last_identified_car_event_id') != event_id }}"

  action:
    - service: input_boolean.turn_on
      target:
        entity_id: "{{ seen_boolean_entity }}"

    - service: input_datetime.set_datetime
      target:
        entity_id: "{{ last_seen_entity }}"
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - service: input_number.set_value
      target:
        entity_id: "{{ count_entity }}"
      data:
        value: "{{ states(count_entity) | int(0) + 1 }}"

    - choose:
        - conditions:
            - condition: template
              value_template: "{{ identified_value in ['amazon', 'ctt'] }}"
          sequence:
            - service: script.broadcast_announcement
              data:
                title: "[Frigate] Delivery vehicle Alert"
                message: >
                  A {{ vehicle_name }} delivery vehicle was detected on camera {{ camera_friendly }}.
                notification_id: "frigate_identified_car_{{ event_id }}"

        - conditions:
            - condition: template
              value_template: "{{ identified_value == 'police' }}"
          sequence:
            - service: script.broadcast_announcement
              data:
                title: "[Frigate] Police vehicle alert"
                message: >
                  A police car was detected on camera {{ camera_friendly }}.
                notification_id: "frigate_identified_car_{{ event_id }}"

    - service: input_text.set_value
      target:
        entity_id: input_text.frigate_last_identified_car_event_id
      data:
        value: "{{ event_id }}"


- alias: "Webhook - Daily Status TTS Gemini"
  id: webhook_daily_status_tts_gemini
  mode: single

  trigger:
    - platform: webhook
      webhook_id: daily_status_tts
      allowed_methods:
        - GET
        - POST
      local_only: true

  variables:
    llm_cooldown_seconds: 90
    last_llm_call: "{{ states('input_datetime.daily_status_last_llm_call') }}"
    can_call_llm: >-
      {{ last_llm_call in ['unknown', 'unavailable', '', none]
         or (as_timestamp(now()) - as_timestamp(last_llm_call)) > llm_cooldown_seconds }}

    helper_facts_json: >-
      {{
        {
          "dog": {
            "seen_today": is_state('input_boolean.dog_seen_today', 'on'),
            "first_seen": states('input_datetime.dog_first_seen_today') if is_state('input_boolean.dog_seen_today', 'on') else '',
            "last_seen": states('input_datetime.dog_last_seen') if is_state('input_boolean.dog_seen_today', 'on') else '',
            "last_camera": states('input_text.dog_last_camera') if is_state('input_boolean.dog_seen_today', 'on') else ''
          },
          "cat": {
            "seen_today": is_state('input_boolean.cat_seen_today', 'on'),
            "first_seen": states('input_datetime.cat_first_seen_today') if is_state('input_boolean.cat_seen_today', 'on') else '',
            "last_seen": states('input_datetime.cat_last_seen') if is_state('input_boolean.cat_seen_today', 'on') else '',
            "last_camera": states('input_text.cat_last_camera') if is_state('input_boolean.cat_seen_today', 'on') else ''
          },
          "leonardo": {
            "seen_today": is_state('input_boolean.leonardo_seen_today', 'on'),
            "first_seen": states('input_datetime.leonardo_first_seen_today') if is_state('input_boolean.leonardo_seen_today', 'on') else '',
            "last_seen": states('input_datetime.leonardo_last_seen') if is_state('input_boolean.leonardo_seen_today', 'on') else '',
            "last_camera": states('input_text.leonardo_last_camera') if is_state('input_boolean.leonardo_seen_today', 'on') else '',
            "car_left_today": is_state('input_boolean.leonardo_car_left_today', 'on'),
            "car_left_at": states('input_datetime.leonardo_car_left_at') if is_state('input_boolean.leonardo_car_left_today', 'on') else '',
            "car_arrived_today": is_state('input_boolean.leonardo_car_arrived_today', 'on'),
            "car_arrived_at": states('input_datetime.leonardo_car_arrived_at') if is_state('input_boolean.leonardo_car_arrived_today', 'on') else ''
          },
          "beatriz": {
            "seen_today": is_state('input_boolean.beatriz_seen_today', 'on'),
            "first_seen": states('input_datetime.beatriz_first_seen_today') if is_state('input_boolean.beatriz_seen_today', 'on') else '',
            "last_seen": states('input_datetime.beatriz_last_seen') if is_state('input_boolean.beatriz_seen_today', 'on') else '',
            "last_camera": states('input_text.beatriz_last_camera') if is_state('input_boolean.beatriz_seen_today', 'on') else ''
          },
          "deliveries": {
            "amazon_seen_today": is_state('input_boolean.amazon_seen_today', 'on'),
            "amazon_count_today": states('input_number.amazon_count_today') | int(0),
            "amazon_last_seen": states('input_datetime.amazon_last_seen_today') if is_state('input_boolean.amazon_seen_today', 'on') else '',
            "ctt_seen_today": is_state('input_boolean.ctt_seen_today', 'on'),
            "ctt_count_today": states('input_number.ctt_count_today') | int(0),
            "ctt_last_seen": states('input_datetime.ctt_last_seen_today') if is_state('input_boolean.ctt_seen_today', 'on') else '',
            "police_seen_today": is_state('input_boolean.police_seen_today', 'on'),
            "police_count_today": states('input_number.police_count_today') | int(0),
            "police_last_seen": states('input_datetime.police_last_seen_today') if is_state('input_boolean.police_seen_today', 'on') else ''
          },
          "perimeter": {
            "unknown_person_detected_today": is_state('input_boolean.unknown_person_detected_today', 'on'),
            "unknown_vehicle_detected_today": is_state('input_boolean.unknown_vehicle_detected_today', 'on'),
            "unknown_person_count_today": states('input_number.unknown_person_count_today') | int(0),
            "unknown_vehicle_count_today": states('input_number.unknown_vehicle_count_today') | int(0),
            "last_unknown_person_time": states('input_datetime.last_unknown_person_time') if is_state('input_boolean.unknown_person_detected_today', 'on') else '',
            "last_unknown_vehicle_time": states('input_datetime.last_unknown_vehicle_time') if is_state('input_boolean.unknown_vehicle_detected_today', 'on') else ''
          }
        } | tojson
      }}

  action:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ can_call_llm }}"
          sequence:
            - action: rest_command.ha_logbook_last_day
              response_variable: logbook_response

            - variables:
                logbook_context: >-
                  {% set ns = namespace(lines=[]) %}
                  {% if logbook_response.status == 200 and logbook_response.content is iterable %}
                    {% for item in logbook_response.content %}
                      {% set raw = (
                        (item.name | default('')) ~ ' ' ~
                        (item.message | default('')) ~ ' ' ~
                        (item.entity_id | default(''))
                      ) | lower %}
                      {% if 'dog' in raw
                            or 'cat' in raw
                            or 'leonardo' in raw
                            or 'beatriz' in raw
                            or 'amazon' in raw
                            or 'ctt' in raw
                            or 'police' in raw
                            or 'unknown' in raw
                            or 'perimeter' in raw
                            or 'alarm' in raw
                            or 'gate' in raw %}
                        {% set line = (
                          (item.when | default('')) ~ ' | ' ~
                          (item.name | default(item.entity_id | default('event'))) ~ ' | ' ~
                          (item.message | default('changed'))
                        ) %}
                        {% set ns.lines = ns.lines + [line] %}
                      {% endif %}
                    {% endfor %}
                  {% endif %}
                  {{ (ns.lines[:25]) | join('\n') if ns.lines | count > 0 else 'No relevant logbook entries captured.' }}

                prompt: >-
                  You are a home status assistant.

                  Write a short and precise daily summary in English.
                  Use HELPER_FACTS as the source of truth.
                  Use LOGBOOK_CONTEXT only as secondary context to improve wording and confirm timing.
                  Never invent facts.
                  If HELPER_FACTS and LOGBOOK_CONTEXT conflict, trust HELPER_FACTS.
                  If a value is empty, unknown, or unavailable, treat it as "no record".

                  Formatting rules:
                  - Write 5 to 8 short lines.
                  - One fact per line.
                  - Prefer exact latest times recorded today when available.
                  - For pets and residents, if they were seen today, mention the latest seen time and the last camera when available.
                  - If they were not seen today, say that clearly.
                  - For delivery and classified vehicles, explicitly write separate lines like:
                    - A CTT delivery vehicle was seen at HH:MM.
                    - An Amazon delivery vehicle was seen at HH:MM.
                    - A police car was seen at HH:MM.
                  - If Leonardo's car left or arrived today, mention the recorded times.
                  - If no unknown people or vehicles were detected at the perimeter, say that clearly.

                  HELPER_FACTS:
                  {{ helper_facts_json }}

                  LOGBOOK_CONTEXT:
                  {{ logbook_context }}

            - action: rest_command.gemini_daily_status
              data:
                prompt: "{{ prompt }}"
              response_variable: gemini_response

            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.daily_status_last_llm_call
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - variables:
        llm_success_text: >-
          {% if can_call_llm
                and gemini_response is defined
                and gemini_response.status == 200
                and gemini_response.content is defined
                and gemini_response.content.candidates is defined
                and gemini_response.content.candidates | count > 0
                and gemini_response.content.candidates[0].content is defined
                and gemini_response.content.candidates[0].content.parts is defined
                and gemini_response.content.candidates[0].content.parts | count > 0 %}
            {{ gemini_response.content.candidates[0].content.parts[0].text | trim }}
          {% else %}
          {% endif %}

        spoken_message: >-
          {% if not can_call_llm %}
            The daily summary was requested very recently. Please wait about one minute and try again.
          {% elif llm_success_text not in ['','unknown','unavailable'] %}
            {{ llm_success_text }}
          {% else %}
            Daily status (The LLM summary is temporarily unavailable, so this is the local fallback):
            {% if is_state('input_boolean.dog_seen_today', 'on') %}
              The dog was detected today.
            {% else %}
              The dog was not detected today.
            {% endif %}
            {% if is_state('input_boolean.cat_seen_today', 'on') %}
              The cat was detected today.
            {% else %}
              The cat was not detected today.
            {% endif %}
            {% if is_state('input_boolean.leonardo_car_left_today', 'on') and is_state('input_boolean.leonardo_car_arrived_today', 'on') %}
              Leonardo's car left and returned today.
            {% elif is_state('input_boolean.leonardo_car_left_today', 'on') %}
              Leonardo's car left today.
            {% elif is_state('input_boolean.leonardo_car_arrived_today', 'on') %}
              Leonardo's car arrived today.
            {% endif %}
            {% set up = states('input_number.unknown_person_count_today') | int(0) %}
            {% set uv = states('input_number.unknown_vehicle_count_today') | int(0) %}
            {% if up == 0 and uv == 0 %}
              No unknown person or vehicle was detected at the perimeter.
            {% else %}
              There were unknown detections at the perimeter today.
            {% endif %}
          {% endif %}

    - choose:
        - conditions: "{{ llm_success_text not in ['','unknown','unavailable'] }}"
          sequence:
            - service: input_text.set_value
              target:
                entity_id: input_text.daily_status_last_summary
              data:
                value: "{{ llm_success_text[:250] ~ '…' }}"

            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.daily_status_last_summary_time
              data:
                datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

    - service: script.broadcast_announcement
      data:
        title: "Daily Status"
        message: "{{ spoken_message }}"
        notification_id: "daily_status_tts"

- alias: Assistant - track persistent notifications
  id: assistant_track_persistent_notifications
  mode: queued
  trigger:
    - platform: event
      event_type: call_service
      id: create
      event_data:
        domain: persistent_notification
        service: create

    - platform: event
      event_type: call_service
      id: dismiss
      event_data:
        domain: persistent_notification
        service: dismiss

    - platform: event
      event_type: call_service
      id: dismiss_all
      event_data:
        domain: persistent_notification
        service: dismiss_all

  action:
    - choose:
        - conditions: "{{ trigger.id == 'create' }}"
          sequence:
            - service: counter.increment
              target:
                entity_id: counter.assistant_persistent_notifications

            # Pequeno delay para garantir que a notificação já foi criada no state machine
            - delay:
                milliseconds: 300

            - variables:
                notif_id: >-
                  {{ trigger.event.data.service_data.notification_id
                     | default('') }}
                notif_title: >-
                  {{ trigger.event.data.service_data.title
                     | default('') | string | trim }}
                notif_message: >-
                  {{ trigger.event.data.service_data.message
                     | default('') | string | trim }}

            - service: input_text.set_value
              target:
                entity_id: input_text.assistant_last_notification_title
              data:
                value: >-
                  {{ notif_title if notif_title not in ['', 'None', 'none']
                     else 'Notification' }}

            - service: input_text.set_value
              target:
                entity_id: input_text.assistant_last_notification_message
              data:
                value: >-
                  {{ notif_message[:255] if notif_message not in ['', 'None', 'none']
                     else '(no message)' }}

        - conditions: "{{ trigger.id == 'dismiss' }}"
          sequence:
            - choose:
                - conditions: >
                    {{ states('counter.assistant_persistent_notifications')|int(0) > 0 }}
                  sequence:
                    - service: counter.decrement
                      target:
                        entity_id: counter.assistant_persistent_notifications

        - conditions: "{{ trigger.id == 'dismiss_all' }}"
          sequence:
            - service: counter.reset
              target:
                entity_id: counter.assistant_persistent_notifications
            - service: input_text.set_value
              target:
                entity_id: input_text.assistant_last_notification_title
              data:
                value: ""
            - service: input_text.set_value
              target:
                entity_id: input_text.assistant_last_notification_message
              data:
                value: ""